<!DOCTYPE html>
<html lang="en">
<head>
    <title>History</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        th {
            background: #2c3e50;
            color: white;
            padding: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 12px;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        tr:hover {
            background-color: #e3f2fd;
            transition: 0.3s;
        }

        a {
            display: block;
            width: 150px;
            margin: 30px auto;
            text-align: center;
            text-decoration: none;
            padding: 10px;
            background: #3498db;
            color: white;
            border-radius: 25px;
            transition: 0.3s;
        }

        a:hover {
            background: #2980b9;
        }
    </style>
</head>

<body>
    <h1>Analysis History</h1>

    <table>
        <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Content</th>
            <th>Result</th>
            <th>Confidence</th>
            <th>Date</th>
            <th>Source</th>
            <th>Category</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{row[0]}}</td>
            <td>{{row[1]}}</td>
            <td>{{row[2]}}</td>
            <td>{{row[3]}}</td>
            <td>{{row[4]}}</td>
            <td>{{row[5]}}</td>
             <td>{{row[6]}}</td>
              <td>{{row[7]}}</td>
            
        </tr>
        {% endfor %}
    </table>

    <a href="/">Go back</a>
</body>
</html>
